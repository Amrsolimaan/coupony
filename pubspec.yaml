name: coupony
description: "Coupony - Your smart coupon and discount companion app."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  cupertino_icons: ^1.0.8
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  dio: ^5.9.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dartz: ^0.10.1
  connectivity_plus: ^7.0.0
  flutter_secure_storage: ^10.0.0
  equatable: ^2.0.8
  get_it: ^9.2.0
  google_fonts: ^6.3.2
  logger: ^2.6.2
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  crypto: ^3.0.7    
  shared_preferences: ^2.5.3
  internet_connection_checker: ^1.0.0+1
  go_router: ^17.0.0
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10+1
  path_provider: ^2.1.2
  permission_handler: ^11.0.1
  geolocator: ^14.0.2
  firebase_messaging: ^16.1.1
  firebase_core: any
  firebase_auth: 6.2.0
  google_sign_in: ^6.2.1
  http: any
  google_maps: ^8.2.0
  google_maps_flutter: ^2.14.0
  geocoding: ^3.0.0
  speech_to_text: ^7.3.0
  
  # ✅ NEW: Image caching dependencies
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  path: ^1.9.1
  flutter_hooks: ^0.21.3+1

flutter_native_splash:
  color: "#ffffff"
  android: true
  ios: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon7.jpg"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
          weight: 400
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
          weight: 400
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: Urbanist
      fonts:
        - asset: assets/fonts/Urbanist-SemiBold.ttf
          weight: 600
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
    - family: PlaypenSansArabic
      fonts:
        - asset: assets/fonts/PlaypenSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlaypenSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlaypenSansArabic-Bold.ttf
          weight: 700
